name: release

# 打 v* tag(或手动 workflow_dispatch 指定 tag)时,在 Linux 上重建 dist/、打包成
# tarball,并创建 / 更新对应的 GitHub Release、附上该产物。构建关卡与 build.yml 一致
# (Node 22 + npm ci + npm run build);发布用 runner 自带的 gh + GITHUB_TOKEN,
# 不涉及 pai-eth0 部署。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag(如 v0.0.1);不存在则由本次运行在当前提交上创建"
        required: true

permissions:
  contents: write # 创建 Release / 上传附件需要写权限

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22" # 满足 package.json engines: node >=22.12.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package dist
        run: tar czf "cards-web-dist-${TAG}.tar.gz" dist

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" "cards-web-dist-${TAG}.tar.gz" \
            --title "$TAG" \
            --generate-notes \
          || gh release upload "$TAG" "cards-web-dist-${TAG}.tar.gz" --clobber
